<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TAF/METAR Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        .input-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .airport-block {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* METAR category colors */
        .metar.vfr { background: #d6ffd6; }
        .metar.mvfr { background: #fff7cc; }
        .metar.ifr { background: #ffd6d6; }

        /* TAF color coding */
        .taf-fm { color: #0055cc; font-weight: bold; }
        .taf-tempo { color: #cc5500; font-weight: bold; }
        .taf-prob { color: #990099; font-weight: bold; }

        /* Wind highlighting */
        .wind-dir { font-weight: bold; color: #003399; }
        .wind-spd { font-weight: bold; }
        .wind-gust { font-weight: bold; color: #cc0000; }

        pre {
            white-space: pre-wrap;
            font-size: 14px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <h1>TAF / METAR Dashboard</h1>

    <div class="input-section">

        <label for="homeAirport"><b>Home Airport:</b></label>
        <input id="homeAirport" type="text" value="KMQS" style="width:100px;">
        <br><br>

        <label for="airportInput"><b>Airports (comma-separated):</b></label><br>
        <input id="airportInput" type="text" style="width:300px;" value="KLNS, KRDG, KABE, KPNE, KPHL, KILG">
        <br><br>

        <label>
            <input type="checkbox" id="includeMetar" checked>
            Include METAR
        </label>
        <br><br>

        <button onclick="runDashboard()">Run Dashboard</button>
        <button onclick="runDashboard()">Retry All</button>

    </div>

    <div id="output"></div>

    <script src="script.js?v=13"></script>

    <script>
    window.onload = runDashboard;
    </script>

</body>
</html>
